name: Build and Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:
    inputs:
      configuration:
        description: 'Build configuration (Debug or Release)'
        type: string
        default: 'Debug'
      publish:
        description: 'Whether to upload the NuGet package artifact'
        type: boolean
        default: false

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            lib: liblancedb_ffi.so
          - os: windows-latest
            rid: win-x64
            lib: lancedb_ffi.dll
          - os: macos-latest
            rid: osx-arm64
            lib: liblancedb_ffi.dylib
    runs-on: ${{ matrix.os }}

    env:
      BUILD_FLAG: ${{ inputs.configuration == 'Release' && '--release' || '' }}
      CARGO_PROFILE: ${{ inputs.configuration == 'Release' && 'release' || 'debug' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Install Protobuf compiler
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: '1.93.1'

      - name: Cache Cargo dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            pinvoke/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('pinvoke/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./build.sh ${{ env.BUILD_FLAG }}

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: build.cmd ${{ env.BUILD_FLAG }}
        shell: cmd

      - name: Run tests (Linux/macOS)
        if: runner.os != 'Windows'
        run: ./test.sh ${{ env.BUILD_FLAG }}

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        run: test.cmd ${{ env.BUILD_FLAG }}
        shell: cmd

      - name: Upload native library
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.rid }}
          path: pinvoke/target/${{ env.CARGO_PROFILE }}/${{ matrix.lib }}

  pack:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Linux native library
        uses: actions/download-artifact@v4
        with:
          name: native-linux-x64
          path: pinvoke/target/${{ inputs.configuration == 'Release' && 'release' || 'debug' }}/

      - name: Download Windows native library
        uses: actions/download-artifact@v4
        with:
          name: native-win-x64
          path: pinvoke/target/${{ inputs.configuration == 'Release' && 'release' || 'debug' }}/

      - name: Download macOS arm64 native library
        uses: actions/download-artifact@v4
        with:
          name: native-osx-arm64
          path: pinvoke/target/${{ inputs.configuration == 'Release' && 'release' || 'debug' }}/

      - name: Pack NuGet package
        run: |
          CONFIGURATION=${{ inputs.configuration || 'Debug' }}
          dotnet build --configuration $CONFIGURATION
          dotnet pack src/lancedb.csproj --configuration $CONFIGURATION --no-build -o ./artifacts

      - name: Verify NuGet package contents
        run: |
          NUPKG=$(ls ./artifacts/*.nupkg)
          echo "=== Package: $NUPKG ==="
          echo "--- Checking target frameworks and native libraries ---"

          CONTENTS=$(unzip -l "$NUPKG")

          MISSING=""
          for EXPECTED in \
            "lib/net8.0/lancedb.dll" \
            "lib/netstandard2.0/lancedb.dll" \
            "runtimes/linux-x64/native/liblancedb_ffi.so" \
            "runtimes/win-x64/native/lancedb_ffi.dll" \
            "runtimes/osx-arm64/native/liblancedb_ffi.dylib"; do
            if echo "$CONTENTS" | grep -q "$EXPECTED"; then
              echo "  ✓ $EXPECTED"
            else
              echo "  ✗ $EXPECTED  MISSING"
              MISSING="$MISSING $EXPECTED"
            fi
          done

          if [ -n "$MISSING" ]; then
            echo "::error::NuGet package is missing required files:$MISSING"
            exit 1
          fi

          echo "--- All required files present ---"

      - name: Smoke test nupkg
        env:
          LANCEDB_LOCAL_FEED: ${{ github.workspace }}/artifacts
        run: |
          cp -r samples/ConsoleSample smoke-runner && cd smoke-runner
          # Swap ProjectReference for PackageReference to the nupkg
          sed -i 's|<ProjectReference Include=".*" />|<PackageReference Include="LanceDB" Version="*-*" />|' ConsoleSample.csproj
          cp ../ci/nuget.config nuget.config
          dotnet run

      - name: Upload NuGet package
        if: inputs.publish
        uses: actions/upload-artifact@v4
        with:
          name: nuget-package
          path: ./artifacts/*.nupkg

  # Verifies the native auto-copy (build/LanceDB.targets) for .NET Framework consumers,
  # which have no deps.json-based native probing. Windows-only: net48 does not run on
  # Linux, and the targets file ships only the win-x64 native.
  smoke-netfx:
    needs: build
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download Windows native library
        uses: actions/download-artifact@v4
        with:
          name: native-win-x64
          path: pinvoke/target/debug/

      - name: Pack LanceDB with win-x64 native
        run: dotnet pack src/lancedb.csproj -o artifacts

      - name: Build and run net48 smoke test
        shell: pwsh
        env:
          LANCEDB_LOCAL_FEED: ${{ github.workspace }}/artifacts
        run: |
          Copy-Item -Recurse samples/ConsoleSample smoke-runner
          $csproj = "smoke-runner/ConsoleSample.csproj"
          $proj = Get-Content $csproj -Raw
          $proj = $proj -replace '<TargetFramework>net8.0</TargetFramework>', '<TargetFramework>net48</TargetFramework><PlatformTarget>x64</PlatformTarget><AutoGenerateBindingRedirects>true</AutoGenerateBindingRedirects>'
          $proj = $proj -replace '<ProjectReference\b[^>]*/>', '<PackageReference Include="LanceDB" Version="*-*" />'
          Set-Content $csproj $proj

          Copy-Item ci/nuget.config smoke-runner/nuget.config

          dotnet build $csproj -c Release
          & "smoke-runner/bin/Release/net48/ConsoleSample.exe"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
